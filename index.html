<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rift Clan | Premium Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #efefef; overflow-x: hidden; position: relative; user-select: none; }
        .card-glass { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.03); transition: all 0.2s ease-out; position: relative; }
        .card-glass:hover { border-color: #8A2BE2; transform: translateY(-3px); box-shadow: 0 8px 30px -10px rgba(138, 43, 226, 0.3); }
        .tab-active { color: #8A2BE2; border-bottom: 2px solid #8A2BE2; }
        .hidden-section { display: none; }
        img { pointer-events: none; }

        /* Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .loader-circle {
            width: 50px; height: 50px; border: 3px solid rgba(138, 43, 226, 0.1);
            border-top: 3px solid #8A2BE2; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .status-online { color: #22c55e; border-left: 4px solid #22c55e; }
        .status-offline { color: #ef4444; border-left: 4px solid #ef4444; }
        
        .access-btn { background: #1a1a1a; border: 1px solid #333; transition: all 0.2s; color: white; border-radius: 8px; }
        .access-btn:hover { background: #8A2BE2; border-color: #8A2BE2; }
        .tutorial-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s; color: #a1a1aa; border-radius: 8px; }
        .tutorial-btn:hover { background: #ff0000; border-color: #ff0000; color: white; }

        .platform-tag { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #8A2BE2; margin-bottom: 12px; display: block; border-bottom: 1px solid rgba(138, 43, 226, 0.2); width: fit-content; padding-bottom: 2px; margin-top: 30px; }
        .count-badge { background: rgba(138, 43, 226, 0.1); color: #8A2BE2; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-size: 9px; }

        /* Slider */
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-250px * 15)); } }
        .slider { height: 150px; margin: auto; overflow: hidden; position: relative; width: 100%; }
        .slider .slide-track { animation: scroll 70s linear infinite; display: flex; width: calc(250px * 30); }
        .slider .slide { height: 140px; width: 250px; padding: 10px; flex-shrink: 0; }
        .slider img { border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); width: 100%; height: 100%; object-fit: cover; }

        .logo-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #8A2BE2; box-shadow: 0 0 15px rgba(138, 43, 226, 0.5); }
        .community-logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #8A2BE2; margin: 0 auto 20px; box-shadow: 0 0 30px rgba(138, 43, 226, 0.4); }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; }

        .search-container { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; transition: all 0.3s; }
        .search-container:focus-within { border-color: #8A2BE2; background: rgba(138, 43, 226, 0.05); }

        /* Categorias Modernas */
        .category-pill { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 8px 18px; border-radius: 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: #71717a; border-bottom: 2px solid transparent; }
        .category-pill:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .category-pill.active { background: linear-gradient(135deg, rgba(138, 43, 226, 0.2), rgba(138, 43, 226, 0.05)); color: #fff; border-color: rgba(138, 43, 226, 0.5); border-bottom: 2px solid #8A2BE2; }

        /* Favoritos */
        .fav-btn { position: absolute; bottom: 12px; right: 12px; cursor: pointer; z-index: 20; color: rgba(255,255,255,0.1); transition: all 0.2s; }
        .fav-btn:hover { transform: scale(1.2); color: #8A2BE2; }
        .fav-btn.active { color: #8A2BE2; filter: drop-shadow(0 0 5px rgba(138, 43, 226, 0.6)); }
    </style>
</head>
<body class="p-6 md:p-10">

    <div id="loader">
        <div class="loader-circle"></div>
        <p class="text-[10px] font-bold uppercase tracking-[0.3em] mt-4 text-purple-500">Neural Syncing</p>
    </div>

    <canvas id="bg-canvas"></canvas>

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-6 relative z-10">
        <div class="flex items-center gap-4">
            <img src="https://cdn.discordapp.com/icons/1395892946259411125/a_eaa40b5a094c3590b45ccf2299f37085.webp?size=512&animated=true" class="logo-img">
            <h1 class="text-3xl font-extrabold tracking-tight text-white uppercase">Rift <span class="text-purple-600 font-light italic">Clan</span></h1>
        </div>

        <div class="search-container flex items-center px-4 py-2 w-full md:w-64">
            <svg class="w-4 h-4 text-zinc-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            <input type="text" id="searchInput" placeholder="Search Rift Hub..." class="bg-transparent border-none outline-none text-xs w-full text-white placeholder-zinc-600">
        </div>

        <nav class="flex gap-8 text-xs font-bold uppercase tracking-widest cursor-pointer">
            <div id="btn-executores" onclick="switchTab('executores')" class="tab-active pb-2">Executors</div>
            <div id="btn-scripts" onclick="switchTab('scripts')" class="text-zinc-500 hover:text-white pb-2">Scripts</div>
            <div id="btn-community" onclick="switchTab('community')" class="text-zinc-500 hover:text-white pb-2">Community</div>
        </nav>
    </header>

    <div class="max-w-7xl mx-auto flex flex-wrap gap-2 mb-12 relative z-10 border-b border-zinc-900/50 pb-8">
        <div class="category-pill active" onclick="filterCategory('all', this)">All</div>
        <div class="category-pill" onclick="filterCategory('windows', this)">Windows</div>
        <div class="category-pill" onclick="filterCategory('android', this)">Android</div>
        <div class="category-pill" onclick="filterCategory('ios', this)">iOS</div>
        <div class="category-pill" onclick="filterCategory('project delta', this)">Project Delta</div>
        <div class="category-pill" onclick="filterCategory('aftermath', this)">Aftermath</div>
        <div class="category-pill border-purple-900/40" onclick="filterCategory('favs', this)">⭐ My Favs</div>
    </div>

    <main class="max-w-7xl mx-auto relative z-10">
        <section id="section-executores">
            <div id="fav-section" class="hidden-section mb-14">
                <span class="platform-tag">⭐ Your Favorites</span>
                <div id="grid-favs" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>

            <span class="platform-tag">Windows <span id="count-windows" class="count-badge">0</span></span>
            <div id="grid-windows" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-10"></div>
            
            <span class="platform-tag">Android <span id="count-android" class="count-badge">0</span></span>
            <div id="grid-android" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-10"></div>
            
            <span class="platform-tag">iOS <span id="count-ios" class="count-badge">0</span></span>
            <div id="grid-ios" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

            <div class="mt-16 border-t border-zinc-900 pt-10 text-center">
                <h2 class="text-xl font-bold text-white mb-6 uppercase tracking-widest">Video Highlights</h2>
                <div class="slider card-glass rounded-2xl">
                    <div class="slide-track" id="thumbSlider"></div>
                </div>
            </div>
        </section>

        <section id="section-scripts" class="hidden-section pb-24">
            <span class="platform-tag">Database Scripts <span id="count-scripts" class="count-badge">0</span></span>
            <div id="scriptGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <section id="section-community" class="hidden-section pb-32 text-center">
            <div class="max-w-3xl mx-auto card-glass p-12 rounded-3xl border border-purple-500/30">
                <img src="https://cdn.discordapp.com/icons/1395892946259411125/a_eaa40b5a094c3590b45ccf2299f37085.webp?size=512&animated=true" class="community-logo">
                <h2 class="text-4xl font-black mb-10 uppercase tracking-tighter text-white">Rift Clan <span class="text-purple-500">Community</span></h2>
                <a href="https://discord.gg/3YtMGuqdkM" target="_blank" class="bg-[#5865F2] px-12 py-4 rounded-xl font-extrabold text-white transition-all hover:scale-105 inline-block uppercase">Join Discord</a>
            </div>
        </section>
    </main>

    <script>
        // --- PROTEÇÃO ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        let favorites = JSON.parse(localStorage.getItem('rift_favs')) || [];
        
        function toggleFav(name) {
            if(favorites.includes(name)) favorites = favorites.filter(f => f !== name);
            else favorites.push(name);
            localStorage.setItem('rift_favs', JSON.stringify(favorites));
            render(document.getElementById('searchInput').value.toLowerCase());
        }

        const IMGS = {
            sirhurt: "https://i.postimg.cc/DWGPk8Qd/2D8Ci-P8ii-P8ii-P8ii-P8ii-P8ii-P8ii-P8ii-P8ii-P8ii-P8ii-P8ii-P8ii-Pslr-Xw050u-V4o-ZGw-AAAAAEl-FTk-Su.png",
            velocity: "https://i.postimg.cc/4KcQkmv5/4Dchhdmjw6u-OIAAAAASUVORK5CYII.png",
            starIcon: "https://i.postimg.cc/cK3Byr7k/9k.png",
            moonIcon: "https://i.postimg.cc/2qW7RVd2/images.png",
            seliware: "https://i.postimg.cc/67ZfJyVh/Vfz-TRX1Iw2v-Sc-AAAAASUVORK5CYII.png",
            vegax: "https://i.postimg.cc/bGn9cs0g/yl-QRLAAAAAEl-FTk-Su-Qm-CC.png",
            ninja: "https://i.postimg.cc/DWGPk8Qj/Z.png",
            volcano: "https://i.postimg.cc/d7hS7s2T/45ab9e1558834bf263c59a3190677633.webp",
            isaeva: "https://i.postimg.cc/V5h96q7D/eb195fc4a0a2f5f27e8e31a9d1e21eb7.webp",
            synapsez: "https://i.postimg.cc/Zv6qJzsh/synz.webp",
            codex: "https://i.postimg.cc/ZWxVC9v8/icon.jpg"
        };

        const executors = [
            { name: "Volt", platform: ["windows"], version: "1.2.8.0", price: "$5.99 Weekly", status: "Online", url: "https://volt.bz/", tutorial: "https://youtu.be/9sXmHnJws5k", img: "https://volt.bz/favicon.ico" },
            { name: "Potassium", platform: ["windows"], version: "2.0.8", price: "$22.99 Lifetime", status: "Online", url: "https://potassium.pro/", tutorial: "https://youtu.be/dqV4Hjvf5KA", img: "https://potassium.pro/favicon.ico" },
            { name: "Wave", platform: ["windows"], version: "NEW-1.2.0", price: "$5.99 Weekly", status: "Online", url: "https://getwave.gg/", tutorial: "https://youtu.be/j8YpMp8pTGY", img: "https://cdn.discordapp.com/icons/1376842062007111750/22b0547b34af14ae19a8f4826e27ad79.webp" },
            { name: "Xeno", platform: ["windows"], version: "Latest", price: "Free", status: "Online", url: "https://xeno.now/", tutorial: "https://youtu.be/JaEdv_Psp_8", img: "https://i.postimg.cc/3WHjDX25/download-(30).jpg" },
            { name: "Cryptic", platform: ["windows"], version: "Bypass • Key", price: "Free", status: "Offline", url: "https://getcryptic.net/", tutorial: "https://youtu.be/L5Oh1SxySu0", img: IMGS.moonIcon },
            { name: "Velocity", platform: ["windows"], version: "0.8.5", price: "Free", status: "Online", url: "https://realvelocity.xyz/", tutorial: "https://youtu.be/XL0qYVhgzNc", img: IMGS.velocity },
            { name: "Solara", platform: ["windows"], version: "v3.237", price: "Free", status: "Online", url: "https://getsolara.dev/", tutorial: "https://youtu.be/okzlSv32ayg", img: IMGS.starIcon },
            { name: "Volcano", platform: ["windows"], version: "v3.2.5.1", price: "Paid", status: "Offline", url: "https://volcano.wtf/", tutorial: "https://youtu.be/727Qn_bxdFo", img: IMGS.volcano },
            { name: "Isaeva", platform: ["windows"], version: "1.3.0", price: "Paid", status: "Online", url: "https://discord.com/invite/Bqzumw4ZFC", tutorial: "https://youtu.be/JCk2_h4ZV7k", img: IMGS.isaeva },
            { name: "Synapse Z", platform: ["windows"], version: "1.0.1.5", price: "Paid", status: "Offline", url: "https://z.synapse.do/", tutorial: "https://youtu.be/luO0SC0WiFQ", img: IMGS.synapsez },
            { name: "Seliware", platform: ["windows"], version: "2.2.3", price: "Paid", status: "Offline", url: "https://seliware.com/", tutorial: "https://youtu.be/_AS1IyjcqtM", img: IMGS.seliware },
            { name: "SirHurt", platform: ["windows"], version: "v5.419", price: "Paid", status: "Online", url: "https://sirhurt.net/", tutorial: "https://youtu.be/uXDA11H4OXE", img: IMGS.sirhurt },
            { name: "Delta", platform: ["android"], version: "Latest", price: "Free", status: "Online", url: "https://deltaexploits.gg/", tutorial: "https://youtu.be/bYNpuEW7JHo", img: IMGS.ninja },
            { name: "Vega X", platform: ["android"], version: "Latest", price: "Free", status: "Online", url: "https://www.vegax.gg/", tutorial: "https://youtu.be/TuzXhj86PFg", img: IMGS.vegax },
            { name: "Codex", platform: ["android"], version: "Latest", price: "Free", status: "Online", url: "https://codex.lol/", tutorial: "https://youtu.be/RgfqfTnEmZE", img: IMGS.codex },
            { name: "Delta iOS", platform: ["ios"], version: "Mobile", price: "Free", status: "Online", url: "https://deltaexploits.gg/", tutorial: "https://youtu.be/bYNpuEW7JHo", img: IMGS.ninja }
        ];

        const scripts = [
            { name: "Lirp Hub", games: ["Project Delta", "Counter Blox", "Universal"], discord: "https://discord.gg/FcYheqNkYe", img: "https://i.postimg.cc/nXnLtz8Q/a-6d234c003ec9e15873ac8090c15c101d.webp", showcase: "https://www.youtube.com/watch?v=qPa4738FxIg" },
            { name: "Misclick.lua", games: ["Project Delta"], discord: "https://discord.gg/acB2DmPJUB", img: "https://cdn.discordapp.com/icons/1251896623626190959/a_ba2bfeb8355fa6b8692ed8f260224a09.webp", showcase: "https://www.youtube.com/watch?v=v_tK-3-2ZYY" },
            { name: "RatHack (Delta)", games: ["Project Delta"], discord: "https://discord.gg/GpTveHdyU4", img: "https://cdn.discordapp.com/icons/1345557066957324388/c3cd672faca6e4dcbf9127a21f617ccd.webp", showcase: "https://www.youtube.com/watch?v=MFLQhyrP5Mw" },
            { name: "RatHack (PF)", games: ["Phantom Forces"], discord: "https://discord.gg/GpTveHdyU4", img: "https://cdn.discordapp.com/icons/1345557066957324388/c3cd672faca6e4dcbf9127a21f617ccd.webp", showcase: "https://www.youtube.com/watch?v=neVlufeXtSg" },
            { name: "Flow.cc", games: ["Aftermath"], discord: "https://discord.gg/TwjmR85PNC", img: "https://cdn.discordapp.com/icons/1472105072467906630/5f23640bb88bfc24fc6e12bd2a18ee36.webp", showcase: "https://www.youtube.com/watch?v=u298pPOSlLM" },
            { name: "Phosphorus", games: ["Aftermath"], discord: "https://discord.gg/G8BSeN6vVC", img: "https://cdn.discordapp.com/icons/1367542497701789726/a_5e818419ee8aa5537399c9a9ee304987.webp", showcase: "https://www.youtube.com/watch?v=pYdf5bOAcZA" },
            { name: "Axal.wtf", games: ["Aftermath"], discord: "https://discord.gg/4xbYgprNhz", img: "https://cdn.discordapp.com/icons/1289172562416242768/a_80b8b60ac7d87575e846f7394160ab46.webp", showcase: "https://youtu.be/_VDCbB-oB88" }
        ];

        let currentCat = "all";

        function switchTab(tab) {
            ['executores', 'scripts', 'community'].forEach(t => {
                document.getElementById('btn-' + t).className = (t === tab) ? 'tab-active pb-2' : 'text-zinc-500 hover:text-white pb-2';
                document.getElementById('section-' + (t === 'executores' ? 'executores' : t)).classList.toggle('hidden-section', t !== tab);
            });
        }

        function filterCategory(cat, el) {
            currentCat = cat;
            document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            render(document.getElementById('searchInput').value.toLowerCase());
        }

        function createExecutorCard(e) {
            const isFav = favorites.includes(e.name);
            return `<div class="card-glass p-4 rounded-xl flex items-center ${e.status === 'Online' ? 'status-online' : 'status-offline'}"><div class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav('${e.name}')"><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></div><img src="${e.img}" class="w-12 h-12 rounded-lg mr-4 object-cover bg-zinc-900/40 p-1"><div class="flex-1"><div class="flex justify-between items-center"><h3 class="font-bold text-white text-md">${e.name}</h3><span class="text-[9px] font-black uppercase tracking-widest">${e.status}</span></div><p class="text-[10px] text-zinc-500 mb-2">${e.version} • ${e.price}</p><div class="flex gap-2"><a href="${e.url}" target="_blank" class="flex-1 text-center py-1.5 text-[10px] font-extrabold access-btn uppercase">Access</a><a href="${e.tutorial}" target="_blank" class="flex-1 text-center py-1.5 text-[10px] font-extrabold tutorial-btn uppercase">Tutorial</a></div></div></div>`;
        }

        function createScriptCard(s) {
            const isFav = favorites.includes(s.name);
            return `<div class="card-glass p-5 rounded-2xl flex flex-col gap-4"><div class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav('${s.name}')"><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></div><div class="flex items-center gap-4"><img src="${s.img}" class="w-14 h-14 rounded-full border border-purple-500/20"><div><h3 class="font-bold text-white">${s.name}</h3><p class="text-[10px] text-zinc-500 uppercase font-bold tracking-tighter">${s.games.join(' • ')}</p></div></div><div class="flex flex-col gap-2"><a href="${s.showcase}" target="_blank" class="text-center py-2 rounded-xl text-[10px] font-extrabold bg-zinc-800 hover:bg-purple-600 text-white uppercase">Watch Showcase</a><a href="${s.discord}" target="_blank" class="text-center py-2 bg-[#5865F2] hover:bg-[#4752C4] rounded-xl text-[10px] font-extrabold text-white uppercase">Discord Server</a></div></div>`;
        }

        function render(filter = "") {
            let fEx = executors.filter(e => e.name.toLowerCase().includes(filter));
            let fSc = scripts.filter(s => s.name.toLowerCase().includes(filter) || s.games.some(g => g.toLowerCase().includes(filter)));

            if(currentCat === 'windows') fEx = fEx.filter(e => e.platform.includes('windows'));
            else if(currentCat === 'android') fEx = fEx.filter(e => e.platform.includes('android'));
            else if(currentCat === 'ios') fEx = fEx.filter(e => e.platform.includes('ios'));
            else if(currentCat === 'project delta') fSc = fSc.filter(s => s.games.some(g => g.toLowerCase().includes('project delta')));
            else if(currentCat === 'aftermath') fSc = fSc.filter(s => s.games.some(g => g.toLowerCase().includes('aftermath')));
            else if(currentCat === 'favs') {
                fEx = fEx.filter(e => favorites.includes(e.name));
                fSc = fSc.filter(s => favorites.includes(s.name));
            }

            const favItems = [...executors, ...scripts].filter(i => favorites.includes(i.name));
            document.getElementById('fav-section').classList.toggle('hidden-section', favItems.length === 0);
            document.getElementById('grid-favs').innerHTML = favItems.map(i => i.platform ? createExecutorCard(i) : createScriptCard(i)).join('');

            document.getElementById('grid-windows').innerHTML = fEx.filter(e => e.platform.includes('windows')).map(createExecutorCard).join('');
            document.getElementById('grid-android').innerHTML = fEx.filter(e => e.platform.includes('android')).map(createExecutorCard).join('');
            document.getElementById('grid-ios').innerHTML = fEx.filter(e => e.platform.includes('ios')).map(createExecutorCard).join('');
            document.getElementById('scriptGrid').innerHTML = fSc.map(createScriptCard).join('');

            document.getElementById('count-windows').innerText = fEx.filter(e => e.platform.includes('windows') && e.status === "Online").length + " Online";
            document.getElementById('count-android').innerText = fEx.filter(e => e.platform.includes('android') && e.status === "Online").length + " Online";
            document.getElementById('count-ios').innerText = fEx.filter(e => e.platform.includes('ios') && e.status === "Online").length + " Online";
            document.getElementById('count-scripts').innerText = fSc.length + " Total";
        }

        // --- BACKGROUND E INICIALIZAÇÃO ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; particles = []; for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5 }); }
        function drawParticles() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = '#8A2BE2'; particles.forEach(p => { p.x += p.vx; p.y += p.vy; if(p.x < 0 || p.x > canvas.width) p.vx *= -1; if(p.y < 0 || p.y > canvas.height) p.vy *= -1; ctx.beginPath(); ctx.arc(p.x, p.y, 1.2, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(drawParticles); }
        window.addEventListener('resize', initParticles); initParticles(); drawParticles();

        document.getElementById('searchInput').addEventListener('input', e => render(e.target.value.toLowerCase()));

        // Renderização do Slider
        const ytVideos = ["9sXmHnJws5k", "dqV4Hjvf5KA", "j8YpMp8pTGY", "L5Oh1SxySu0", "XL0qYVhgzNc", "okzlSv32ayg", "727Qn_bxdFo", "uXDA11H4OXE", "bYNpuEW7JHo", "TuzXhj86PFg", "RgfqfTnEmZE", "JCk2_h4ZV7k", "luO0SC0WiFQ", "qPa4738FxIg", "JaEdv_Psp_8"];
        const sliderContent = ytVideos.map(id => `<div class="slide"><a href="https://youtu.be/${id}" target="_blank"><img src="https://img.youtube.com/vi/${id}/mqdefault.jpg"></a></div>`).join('');
        document.getElementById('thumbSlider').innerHTML = sliderContent + sliderContent;

        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.visibility = 'hidden', 500);
        }, 1000);

        render();
    </script>
</body>

<style>
    /* Estilo da Caixa de Recomendação */
    #recommendation-box {
        position: fixed;
        bottom: 25px;
        right: 25px;
        width: 300px;
        background: rgba(10, 10, 10, 0.95);
        border: 1px solid #8A2BE2;
        border-radius: 16px;
        padding: 15px;
        z-index: 10000;
        box-shadow: 0 10px 40px -10px rgba(138, 43, 226, 0.5);
        backdrop-filter: blur(10px);
        transform: translateY(150%);
        transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: none;
    }
    #recommendation-box.show { display: block; transform: translateY(0); }
    .close-rec {
        position: absolute; top: 10px; right: 12px;
        color: #555; cursor: pointer; font-weight: bold; transition: 0.2s;
    }
    .close-rec:hover { color: #ff0000; }
    .rec-label { font-size: 9px; font-weight: 800; color: #8A2BE2; text-transform: uppercase; margin-bottom: 5px; display: block; }
</style>

<div id="recommendation-box">
    <div class="close-rec" onclick="closeRecommendation()">✕</div>
    <span class="rec-label">Recommended for you</span>
    <div id="rec-content"></div>
</div>

<script>
    function closeRecommendation() {
        document.getElementById('recommendation-box').classList.remove('show');
    }

    function checkPlatformAndRecommend() {
        const userAgent = navigator.userAgent.toLowerCase();
        let platform = "";

        if (userAgent.includes("win")) platform = "windows";
        else if (userAgent.includes("android")) platform = "android";
        else if (userAgent.includes("iphone") || userAgent.includes("ipad")) platform = "ios";

        if (platform) {
            // Filtra executores da plataforma que estão ONLINE
            const available = executors.filter(e => e.platform.includes(platform) && e.status === "Online");
            
            if (available.length > 0) {
                // Escolhe um aleatório da lista online
                const randomExec = available[Math.floor(Math.random() * available.length)];
                
                const content = `
                    <div class="flex items-center gap-3">
                        <img src="${randomExec.img}" class="w-10 h-10 rounded-lg border border-purple-500/30">
                        <div>
                            <h4 class="text-white text-xs font-bold">${randomExec.name}</h4>
                            <p class="text-[9px] text-zinc-400">${randomExec.price} • ${randomExec.version}</p>
                        </div>
                    </div>
                    <a href="${randomExec.url}" target="_blank" class="block w-full text-center py-2 mt-3 bg-purple-600 hover:bg-purple-700 text-white text-[10px] font-black rounded-lg uppercase transition-all">
                        Get it now
                    </a>
                `;
                
                document.getElementById('rec-content').innerHTML = content;
                
                // Mostra a caixa após o carregamento (1.5 segundos após o loader sumir)
                setTimeout(() => {
                    document.getElementById('recommendation-box').classList.add('show');
                }, 2500);
            }
        }
    }

    // Chame a função no final do seu script principal ou dentro do seu window.onload
    // Exemplo: Coloque no final da sua função render() original:
    // render(); 
    checkPlatformAndRecommend();
</script>
