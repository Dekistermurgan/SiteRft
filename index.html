<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rift Clan | Premium Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #efefef; overflow-x: hidden; position: relative; user-select: none; }
        .card-glass { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.03); transition: all 0.2s ease-out; }
        .card-glass:hover { border-color: #8A2BE2; transform: translateY(-3px); box-shadow: 0 8px 30px -10px rgba(138, 43, 226, 0.3); }
        .tab-active { color: #8A2BE2; border-bottom: 2px solid #8A2BE2; }
        .hidden-section { display: none; }
        img { pointer-events: none; }

        /* Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .loader-circle {
            width: 50px; height: 50px; border: 3px solid rgba(138, 43, 226, 0.1);
            border-top: 3px solid #8A2BE2; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .status-online { color: #22c55e; border-left: 4px solid #22c55e; }
        .status-offline { color: #ef4444; border-left: 4px solid #ef4444; }
        
        .access-btn { background: #1a1a1a; border: 1px solid #333; transition: all 0.2s; color: white; border-radius: 8px; }
        .access-btn:hover { background: #8A2BE2; border-color: #8A2BE2; }
        .tutorial-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s; color: #a1a1aa; border-radius: 8px; }
        .tutorial-btn:hover { background: #ff0000; border-color: #ff0000; color: white; }

        .platform-tag { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #8A2BE2; margin-bottom: 12px; display: block; border-bottom: 1px solid rgba(138, 43, 226, 0.2); width: fit-content; padding-bottom: 2px; margin-top: 30px; }
        .count-badge { background: rgba(138, 43, 226, 0.1); color: #8A2BE2; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-size: 9px; }

        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-250px * 12)); } }
        .slider { height: 150px; margin: auto; overflow: hidden; position: relative; width: 100%; }
        .slider .slide-track { animation: scroll 70s linear infinite; display: flex; width: calc(250px * 24); }
        .slider .slide { height: 140px; width: 250px; padding: 10px; flex-shrink: 0; }
        .slider img { border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); width: 100%; height: 100%; object-fit: cover; }

        .logo-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #8A2BE2; box-shadow: 0 0 15px rgba(138, 43, 226, 0.5); }
        .community-logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #8A2BE2; margin: 0 auto 20px; box-shadow: 0 0 30px rgba(138, 43, 226, 0.4); }
        
        /* Background & Search */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; }
        .search-container { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; transition: all 0.3s; }
        .search-container:focus-within { border-color: #8A2BE2; background: rgba(138, 43, 226, 0.05); }

        /* FAQ */
        .faq-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; margin-bottom: 10px; transition: all 0.3s; }
        .faq-question { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 13px; }
        .faq-answer { padding: 0 20px; max-height: 0; overflow: hidden; transition: all 0.3s ease-out; font-size: 12px; color: #a1a1aa; line-height: 1.6; }
        .faq-item.active { border-color: #8A2BE2; background: rgba(138, 43, 226, 0.03); }
        .faq-item.active .faq-answer { padding-bottom: 20px; max-height: 200px; }

        /* PREMIUM TOASTS */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(138, 43, 226, 0.3); border-left: 4px solid #8A2BE2; color: white; padding: 16px 24px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; backdrop-filter: blur(15px); transform: translateX(130%); transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.7); display: flex; align-items: center; gap: 12px; position: relative; overflow: hidden; }
        .toast.show { transform: translateX(0); }
        .toast::after { content: ''; position: absolute; bottom: 0; left: 0; height: 2px; background: #8A2BE2; width: 100%; animation: toast-progress 4s linear forwards; }
        @keyframes toast-progress { from { width: 100%; } to { width: 0%; } }
        .toast-icon { background: rgba(138, 43, 226, 0.2); padding: 6px; border-radius: 8px; color: #8A2BE2; display: flex; align-items: center; justify-content: center; }
    </style>
</head>

            { name: "Volcano", platform: ["windows"], version: "v3.2.5.1", price: "Paid", status: "Offline", url: "https://volcano.wtf/", tutorial: "https://youtu.be/727Qn_bxdFo", img: IMGS.volcano },

            { name: "Synapse Z", platform: ["windows"], version: "1.0.1.5", price: "Paid", status: "Offline", url: "https://z.synapse.do/", tutorial: "https://youtu.be/luO0SC0WiFQ", img: IMGS.synapsez },
            { name: "Seliware", platform: ["windows"], version: "2.2.3", price: "Paid", status: "Offline", url: "https://seliware.com/", tutorial: "https://youtu.be/_AS1IyjcqtM", img: IMGS.seliware },
            { name: "SirHurt", platform: ["windows"], version: "v5.419", price: "Paid", status: "Online", url: "https://sirhurt.net/", tutorial: "https://youtu.be/uXDA11H4OXE", img: IMGS.sirhurt },
            { name: "Delta", platform: ["android"], version: "Latest", price: "Free", status: "Online", url: "https://deltaexploits.gg/", tutorial: "https://youtu.be/bYNpuEW7JHo", img: IMGS.ninja },
            { name: "Vega X", platform: ["android"], version: "Latest", price: "Free", status: "Online", url: "https://www.vegax.gg/", tutorial: "https://youtu.be/TuzXhj86PFg", img: IMGS.vegax },

        ];

        const scripts = [
            { name: "Lirp Hub", games: ["Project Delta", "Counter Blox", "Universal"], discord: "https://discord.gg/FcYheqNkYe", img: "https://i.postimg.cc/nXnLtz8Q/a-6d234c003ec9e15873ac8090c15c101d.webp", showcase: "https://www.youtube.com/watch?v=qPa4738FxIg" },
            { name: "Misclick.lua", games: ["Project Delta"], discord: "https://discord.gg/acB2DmPJUB", img: "https://cdn.discordapp.com/icons/1251896623626190959/a_ba2bfeb8355fa6b8692ed8f260224a09.webp", showcase: "https://www.youtube.com/watch?v=v_tK-3-2ZYY" },
            { name: "RatHack (Delta)", games: ["Project Delta"], discord: "https://discord.gg/GpTveHdyU4", img: "https://cdn.discordapp.com/icons/1345557066957324388/c3cd672faca6e4dcbf9127a21f617ccd.webp", showcase: "https://www.youtube.com/watch?v=MFLQhyrP5Mw" },
            { name: "RatHack (PF)", games: ["Phantom Forces"], discord: "https://discord.gg/GpTveHdyU4", img: "https://cdn.discordapp.com/icons/1345557066957324388/c3cd672faca6e4dcbf9127a21f617ccd.webp", showcase: "https://www.youtube.com/watch?v=neVlufeXtSg" },
            { name: "Flow.cc", games: ["Aftermath"], discord: "https://discord.gg/TwjmR85PNC", img: "https://cdn.discordapp.com/icons/1472105072467906630/5f23640bb88bfc24fc6e12bd2a18ee36.webp", showcase: "https://www.youtube.com/watch?v=u298pPOSlLM" },
            { name: "Phosphorus", games: ["Aftermath"], discord: "https://discord.gg/G8BSeN6vVC", img: "https://cdn.discordapp.com/icons/1367542497701789726/a_5e818419ee8aa5537399c9a9ee304987.webp", showcase: "https://www.youtube.com/watch?v=pYdf5bOAcZA" },
            { name: "Axal.wtf", games: ["Aftermath"], discord: "https://discord.gg/4xbYgprNhz", img: "https://cdn.discordapp.com/icons/1289172562416242768/a_80b8b60ac7d87575e846f7394160ab46.webp", showcase: "https://youtu.be/_VDCbB-oB88" }
        ];

        const faqData = [
            { q: "Is the site safe?", a: "Yes, all links are verified. We recommend using a VPN for extra safety." },
            { q: "What is an Executor?", a: "Tools used to run custom Lua scripts in game to modify mechanics." },
            { q: "Antivirus flagged it?", a: "Executors are often false positives due to injection. Add an exception." }
        ];

        // --- BG ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initParticles() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; particles = []; for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5 }); }
        function drawParticles() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = '#8A2BE2'; particles.forEach(p => { p.x += p.vx; p.y += p.vy; if(p.x < 0 || p.x > canvas.width) p.vx *= -1; if(p.y < 0 || p.y > canvas.height) p.vy *= -1; ctx.beginPath(); ctx.arc(p.x, p.y, 1.2, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(drawParticles); }
        window.addEventListener('resize', initParticles); initParticles(); drawParticles();

        // --- TOASTS ---
        function showToast(text, delay) {
            setTimeout(() => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `<div class="toast-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg></div><span>${text}</span>`;
                container.appendChild(toast);
                setTimeout(() => toast.classList.add('show'), 100);
                setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 600); }, 4000);
            }, delay);
        }

        function switchTab(tab) {
            ['executores', 'scripts', 'community'].forEach(t => {
                document.getElementById('btn-' + t).className = (t === tab) ? 'tab-active pb-2' : 'text-zinc-500 hover:text-white pb-2';
                document.getElementById('section-' + (t === 'executores' ? 'executores' : t)).classList.toggle('hidden-section', t !== tab);
            });
        }

        function createExecutorCard(e) {
            return `<div class="card-glass p-4 rounded-xl flex items-center ${e.status === 'Online' ? 'status-online' : 'status-offline'}"><img src="${e.img}" class="w-12 h-12 rounded-lg mr-4 object-cover bg-zinc-900/40 p-1"><div class="flex-1"><div class="flex justify-between items-center"><h3 class="font-bold text-white text-md">${e.name}</h3><span class="text-[9px] font-black uppercase tracking-widest">${e.status}</span></div><p class="text-[10px] text-zinc-500 mb-2">${e.version} • ${e.price}</p><div class="flex gap-2"><a href="${e.url}" target="_blank" class="flex-1 text-center py-1.5 text-[10px] font-extrabold access-btn uppercase">Access</a><a href="${e.tutorial}" target="_blank" class="flex-1 text-center py-1.5 text-[10px] font-extrabold tutorial-btn uppercase">Tutorial</a></div></div></div>`;
        }

        function createScriptCard(s) {
            return `<div class="card-glass p-5 rounded-2xl flex flex-col gap-4"><div class="flex items-center gap-4"><img src="${s.img}" class="w-14 h-14 rounded-full border border-purple-500/20"><div><h3 class="font-bold text-white">${s.name}</h3><p class="text-[10px] text-zinc-500 uppercase font-bold tracking-tighter">${s.games.join(' • ')}</p></div></div><div class="flex flex-col gap-2"><a href="${s.showcase}" target="_blank" class="text-center py-2 rounded-xl text-[10px] font-extrabold bg-zinc-800 hover:bg-purple-600 text-white uppercase">Watch Showcase</a><a href="${s.discord}" target="_blank" class="text-center py-2 bg-[#5865F2] hover:bg-[#4752C4] rounded-xl text-[10px] font-extrabold text-white uppercase">Discord Server</a></div></div>`;
        }

        function toggleFaq(index) { document.getElementById(`faq-${index}`).classList.toggle('active'); }

        document.getElementById('searchInput').addEventListener('input', e => render(e.target.value.toLowerCase()));

        function render(filter = "") {
            const fEx = executors.filter(e => e.name.toLowerCase().includes(filter));
            const fSc = scripts.filter(s => s.name.toLowerCase().includes(filter) || s.games.some(g => g.toLowerCase().includes(filter)));
            
            document.getElementById('grid-windows').innerHTML = fEx.filter(e => e.platform.includes('windows')).map(createExecutorCard).join('');
            document.getElementById('grid-android').innerHTML = fEx.filter(e => e.platform.includes('android')).map(createExecutorCard).join('');
            document.getElementById('grid-ios').innerHTML = fEx.filter(e => e.platform.includes('ios')).map(createExecutorCard).join('');
            document.getElementById('scriptGrid').innerHTML = fSc.map(createScriptCard).join('');

            document.getElementById('count-windows').innerText = fEx.filter(e => e.platform.includes('windows') && e.status === "Online").length + " Online";
            document.getElementById('count-android').innerText = fEx.filter(e => e.platform.includes('android') && e.status === "Online").length + " Online";
            document.getElementById('count-ios').innerText = fEx.filter(e => e.platform.includes('ios') && e.status === "Online").length + " Online";
            document.getElementById('count-scripts').innerText = fSc.length + " Total";
        }

        // Lógica de Inicialização (SÓ RODA UMA VEZ)
        function init() {
            render();
            document.getElementById('faq-container').innerHTML = faqData.map((item, i) => `<div class="faq-item" onclick="toggleFaq(${i})" id="faq-${i}"><div class="faq-question"><span>${item.q}</span><svg class="w-4 h-4 text-purple-500 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></div><div class="faq-answer">${item.a}</div></div>`).join('');

            const ytVideos = ["9sXmHnJws5k", "dqV4Hjvf5KA", "j8YpMp8pTGY", "L5Oh1SxySu0", "XL0qYVhgzNc", "okzlSv32ayg", "727Qn_bxdFo", "uXDA11H4OXE"];
            const sliderItems = ytVideos.map(id => `<div class="slide"><a href="https://youtu.be/${id}" target="_blank"><img src="https://img.youtube.com/vi/${id}/mqdefault.jpg"></a></div>`).join('');
            document.getElementById('thumbSlider').innerHTML = sliderItems + sliderItems;

            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => { 
                    loader.style.visibility = 'hidden';
                    // Toasts de Boas-vindas (Só aqui)
                    showToast("Welcome to Rift Clan Premium Hub", 500);
                    showToast("Database Synced Successfully", 2000);
                }, 500);
            }, 1000);
        }

        init();
    </script>
</body>
